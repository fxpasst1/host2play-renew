name: Auto Renew Server Script

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

jobs:
  run-renew:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb ffmpeg unzip
          wget -q -O - https://dl-ssl.google.com/linux/signing_key.pub | sudo apt-key add -
          sudo sh -c 'echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" >> /etc/apt/sources.list.d/google-chrome.list'
          sudo apt-get install -y google-chrome-stable

      - name: Install and Run GOST SOCKS5 Proxy
        env:
          PROXY_LINK: ${{ secrets.PROXY_LINK }}  # 例如：ss://xxx 或 vmess://xxx 或 socks5://...
        run: |
          echo "⬇️ 下载 gost"
          wget -q https://github.com/go-gost/gost/releases/latest/download/gost-linux-amd64.gz
          gzip -d gost-linux-amd64.gz
          chmod +x gost-linux-amd64

          echo "🚀 启动 gost 本地 SOCKS5 代理 :10808"
          nohup ./gost-linux-amd64 -L socks5://127.0.0.1:10808 -F "$PROXY_LINK" > gost.log 2>&1 &

          echo "⏳ 等待启动 5 秒"
          sleep 5

          echo "🌐 测试代理"
          curl -x socks5h://127.0.0.1:10808 -I https://www.google.com/generate_204 || true

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install DrissionPage xvfbwrapper requests SpeechRecognition pydub

      - name: Run Renew Script
        env:
          RENEW_URL: ${{ secrets.RENEW_URL }}
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          PROXY: socks5://127.0.0.1:10808  # 这里改为 Socks5
        run: python main.py

      - name: Upload Error Screenshots
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: debug-screenshots
          path: ./*.html
          retention-days: 5
